name: Validate algo-safe-frontend

on:
  workflow_call:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.2

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build contracts package
        run: pnpm --filter algo-safe run build-package

      - name: Lint frontend
        run: pnpm --dir projects/algo-safe-frontend run lint

      - name: Test frontend
        run: pnpm --dir projects/algo-safe-frontend run test

      - name: Build frontend
        run: pnpm --dir projects/algo-safe-frontend run build
